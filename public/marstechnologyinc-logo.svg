<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
  <!-- Mars Technology Inc — text-based editorial wordmark.
       Colors mirror the app's CSS tokens: primary #A31D1D, background #FEF9E1, foreground #37120D -->
  <rect width="800" height="320" fill="#FEF9E1" />
  <rect x="0" y="0" width="800" height="14" fill="#A31D1D" />
  <rect x="0" y="306" width="800" height="14" fill="#37120D" />
  <text
    x="400"
    y="185"
    text-anchor="middle"
    font-family="Anton, Impact, 'Arial Narrow', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="150"
    letter-spacing="6"
    fill="#A31D1D"
  >MARS</text>
  <text
    x="400"
    y="252"
    text-anchor="middle"
    font-family="Anton, Impact, 'Arial Narrow', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="34"
    letter-spacing="16"
    fill="#37120D"
  >TECHNOLOGY INC.</text>
